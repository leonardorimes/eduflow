<!DOCTYPE html>
<html>
<body>
  <iframe id="player" src="https://www.youtube.com/embed/M7lc1UVf-VE?enablejsapi=1&origin=http://localhost:3000" width="640" height="360" frameborder="0"></iframe>
  <script>
    window.addEventListener("message", function(event) {
      console.log("Received:", event.data);
    });
    document.getElementById("player").onload = function() {
      document.getElementById("player").contentWindow.postMessage(JSON.stringify({event: 'listening', id: 1, channel: 'widget'}), '*');
    }
  </script>
</body>
</html>
